name: Github Build for platforms
on:
 push:
    tags: ['v*']
 workflow_dispatch:


jobs:
   build:
      strategy:
         matrix:
            os: [windows-latest, macos-latest, ubuntu-latest]
      runs-on: ${{ matrix.os }}

      steps:
         - uses: actions/checkout@v6
         - uses: actions/setup-java@v4
           with:
               java-version: '21'
               distribution: 'temurin'
               cache: maven
         
         - name: Build to JAR
           run: mvn package
      
         - name: Package (Windows)
           if: matrix.os == 'windows-latest'
           run: |
              ls
              jpackage --input target --main-jar target/rpg-1.jar \
              --main-class top.archiem.java.rpg.Main --name JaRpg \
              --app-version 1.0.0 --win-console --type exe

         - name: Package (macOS)
           if: matrix.os == 'macos-latest'
           run: |
              ls
              jpackage --input target --main-jar target/rpg-1.jar \
              --main-class top.archiem.java.rpg.Main --name JaRpg \
              --app-version 1.0.0 --type dmg

         - name: Package (Linux)
           if: matrix.os == 'ubuntu-latest'
           run: |
              ls
              jpackage --input target --main-jar target/rpg-1.jar \
              --main-class top.archiem.java.rpg.Main --name JaRpg \
              --app-version 1.0.0 --type deb

         - name: Upload artifact
           uses: actions/upload-artifact@v4
           with:
             name: binary-${{ matrix.os }}
             path: |
               *.exe
               *.dmg
               *.deb
               *.jar

   publish-to-release:
      runs-on: ubuntu-latest
      needs: build
      permissions:
       contents: write

      steps:
         - uses: actions/download-artifact@v8
           with:
            path: /assets
         - uses: ncipollo/release-action@v1
           with:
            artifacts: "/assets/*"
            token: ${{ secrets.GITHUB_TOKEN }}
